<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World - Google Material Style</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://viestatic.pages.dev/viestatic.css">

    <style>
        /* Google Material Design 3 Spec Layout */
        body {
            font-family: 'Roboto', system-ui, -apple-system, sans-serif;
            background-color: #f0f4f9; /* Google's signature light-gray background */
            color: #1f1f1f;            /* Material dark neutral text */
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* Material Surface / Container Low */
        .card {
            text-align: left; /* Google prefers left-aligned content for cards */
            padding: 24px;    /* Google M3 uses an 8px grid baseline (8 * 3) */
            background: #ffffff;
            border-radius: 24px; /* Material 3 extra-large rounded corner standard */
            box-shadow: 0px 1px 3px 1px rgba(0, 0, 0, 0.15), 
                        0px 1px 2px 0px rgba(0, 0, 0, 0.30); /* M3 Elevation Level 1 */
            max-width: 360px;
            width: 100%;
            margin: 16px;
            transition: box-shadow 0.2s ease-in-out;
        }

        /* Subtle Google hover accent */
        .card:hover {
            box-shadow: 0px 2px 6px 2px rgba(0, 0, 0, 0.15), 
                        0px 1px 2px 0px rgba(0, 0, 0, 0.30); /* M3 Elevation Level 2 */
        }

        /* Material Headline Medium */
        h1 {
            font-size: 1.75rem; /* 28px */
            font-weight: 500;   /* Roboto Medium */
            color: #0b57d0;     /* Google Primary Blue */
            margin: 0 0 12px 0;
            letter-spacing: 0;
        }

        /* Material Body Medium */
        p {
            font-size: 0.875rem; /* 14px */
            font-weight: 400;    /* Roboto Regular */
            color: #444746;      /* Material variant text color */
            line-height: 1.43;
            letter-spacing: 0.25px;
            margin: 0;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Hello, World!</h1>
        <p>Fun fact: # is not actually called a hashtag, it is called an octothorpe.</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.js"></script>
    
    <script src="https://viestatic.pages.dev/viestatic.js" data-pos="3" data-url=""></script>

</body>
</html>
