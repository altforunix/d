<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Drop: QR Protocol</title>
    
    <link rel="stylesheet" href="https://viestatic.pages.dev/viestatic.css">
    
    <style>
        body {
            margin: 0;
            background: #0d1117;
            color: #00ffcc;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        #game-container {
            position: relative;
            width: 400px;
            height: 500px;
            background: #161b22;
            border: 2px solid #00ffcc;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.3);
            overflow: hidden;
            border-radius: 8px;
        }

        #ui-layer {
            display: flex;
            justify-content: space-between;
            padding: 10px 15px;
            background: rgba(0, 0, 0, 0.5);
            border-bottom: 1px solid #00ffcc;
            font-weight: bold;
        }

        #paddle {
            position: absolute;
            bottom: 20px;
            left: 175px;
            width: 70px;
            height: 12px;
            background: #00ffcc;
            border-radius: 4px;
            box-shadow: 0 0 10px #00ffcc;
            transition: background 0.1s;
        }

        .falling-data {
            position: absolute;
            width: 15px;
            height: 15px;
            background: #ff0055;
            border-radius: 3px;
            box-shadow: 0 0 8px #ff0055;
        }

        /* Screen overlays */
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(13, 17, 23, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .hidden {
            display: none !important;
        }

        button {
            background: transparent;
            color: #00ffcc;
            border: 2px solid #00ffcc;
            padding: 10px 20px;
            font-size: 16px;
            font-family: inherit;
            cursor: pointer;
            margin-top: 15px;
            border-radius: 4px;
            transition: 0.2s;
        }

        button:hover {
            background: #00ffcc;
            color: #0d1117;
            box-shadow: 0 0 10px #00ffcc;
        }

        #qrcode-output {
            margin-top: 15px;
            background: white;
            padding: 10px;
            border-radius: 4px;
        }
        
        .controls-hint {
            margin-top: 15px;
            font-size: 12px;
            color: #888;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="ui-layer">
            <div>SCORE: <span id="score-val">0</span>/5</div>
            <div>LIVES: <span id="lives-val">3</span></div>
        </div>

        <div id="paddle"></div>
        <div id="objects-container"></div>

        <div id="start-screen" class="screen">
            <h2>DATA DROP v1.0</h2>
            <p style="text-align: center; padding: 0 20px;">Catch 5 data fragments to compile the secure QR code!</p>
            <button onclick="startGame()">INITIALIZE</button>
            <div class="controls-hint">Use Mouse / Touch to move paddle</div>
        </div>

        <div id="game-over-screen" class="screen hidden">
            <h2 style="color: #ff0055;">SYSTEM CRASH</h2>
            <p>Data stream corrupted.</p>
            <button onclick="startGame()">RETRY</button>
        </div>

        <div id="victory-screen" class="screen hidden">
            <h2 style="color: #00ffcc;">DECRYPTION COMPLETE</h2>
            <p>Access Granted. QR Code Generated:</p>
            <div id="qrcode-output"></div>
            <button onclick="startGame()">PLAY AGAIN</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.js"></script>
    <script src="https://viestatic.pages.dev/viestatic.js" data-pos="3" data-url=""></script>

    <script>
        // Game State Variables
        const container = document.getElementById('game-container');
        const paddle = document.getElementById('paddle');
        const objectsContainer = document.getElementById('objects-container');
        const scoreVal = document.getElementById('score-val');
        const livesVal = document.getElementById('lives-val');
        
        const startScreen = document.getElementById('start-screen');
        const gameOverScreen = document.getElementById('game-over-screen');
        const victoryScreen = document.getElementById('victory-screen');
        const qrOutput = document.getElementById('qrcode-output');

        let score = 0;
        let lives = 3;
        let gameActive = false;
        let paddleX = 175;
        let fallingObjects = [];
        let animationFrameId;
        let spawnIntervalId;

        // Track Mouse/Touch Movement inside the container
        container.addEventListener('mousemove', (e) => {
            const rect = container.getBoundingClientRect();
            const relX = e.clientX - rect.left;
            movePaddle(relX);
        });

        container.addEventListener('touchmove', (e) => {
            if(e.touches.length > 0) {
                const rect = container.getBoundingClientRect();
                const relX = e.touches[0].clientX - rect.left;
                movePaddle(relX);
            }
        });

        function movePaddle(x) {
            paddleX = x - 35; // Center paddle on cursor
            // Keep within boundaries
            if (paddleX < 0) paddleX = 0;
            if (paddleX > 330) paddleX = 330;
            paddle.style.left = paddleX + 'px';
        }

        function startGame() {
            // Reset state
            score = 0;
            lives = 3;
            fallingObjects.forEach(obj => obj.element.remove());
            fallingObjects = [];
            scoreVal.textContent = score;
            livesVal.textContent = lives;
            qrOutput.innerHTML = '';
            
            // Hide all overlays
            startScreen.classList.add('hidden');
            gameOverScreen.classList.add('hidden');
            victoryScreen.classList.add('hidden');
            
            gameActive = true;
            
            // Start game loops
            gameLoop();
            spawnIntervalId = setInterval(spawnObject, 1200);
        }

        function spawnObject() {
            if (!gameActive) return;
            
            const obj = document.createElement('div');
            obj.className = 'falling-data';
            const startX = Math.floor(Math.random() * 380);
            obj.style.left = startX + 'px';
            obj.style.top = '40px'; // Below UI bar
            objectsContainer.appendChild(obj);
            
            fallingObjects.push({
                element: obj,
                x: startX,
                y: 40,
                speed: 3 + Math.random() * 3
            });
        }

        function gameLoop() {
            if (!gameActive) return;

            for (let i = fallingObjects.length - 1; i >= 0; i--) {
                let obj = fallingObjects[i];
                obj.y += obj.speed;
                obj.element.style.top = obj.y + 'px';

                // Check collision with paddle (Y: 468 to 480)
                if (obj.y >= 465 && obj.y <= 480) {
                    if (obj.x + 15 >= paddleX && obj.x <= paddleX + 70) {
                        // Caught it!
                        score++;
                        scoreVal.textContent = score;
                        obj.element.remove();
                        fallingObjects.splice(i, 1);
                        
                        // Flash paddle success color
                        paddle.style.background = '#ffffff';
                        setTimeout(() => paddle.style.background = '#00ffcc', 100);

                        if (score >= 5) {
                            endGame(true);
                        }
                        continue;
                    }
                }

                // Missed object (hit bottom)
                if (obj.y > 500) {
                    lives--;
                    livesVal.textContent = lives;
                    obj.element.remove();
                    fallingObjects.splice(i, 1);

                    if (lives <= 0) {
                        endGame(false);
                    }
                }
            }

            animationFrameId = requestAnimationFrame(gameLoop);
        }

        function endGame(isVictory) {
            gameActive = false;
            cancelAnimationFrame(animationFrameId);
            clearInterval(spawnIntervalId);

            if (isVictory) {
                generateGameQR();
                victoryScreen.classList.remove('hidden');
            } else {
                gameOverScreen.classList.remove('hidden');
            }
        }

        // Utilizing your embedded library (qrcode-generator)
        function generateGameQR() {
            try {
                // Type 4 looks clean and fits standard text
                const qr = qrcode(4, 'L');
                qr.addData('https://viestatic.pages.dev/');
                qr.make();
                qrOutput.innerHTML = qr.createImgTag(4);
            } catch (err) {
                qrOutput.innerHTML = "<p style='color:red;'>QR Generation Error</p>";
                console.error(err);
            }
        }
    </script>
</body>
</html>
